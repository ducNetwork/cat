info:
  name: Login
  type: http
  seq: 1

http:
  method: GET
  url: "{{xrpc_duc}}.oauth.login?handle={{handle}}&redirect_uri=http://127.0.0.1:3000/session"
  params:
    - name: handle
      value: "{{handle}}"
      type: query
    - name: redirect_uri
      value: http://127.0.0.1:3000/session
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
